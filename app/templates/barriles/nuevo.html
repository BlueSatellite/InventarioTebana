{% extends "base.html" %}
{% block title %}Nuevo Barril - Cerveceria{% endblock %}
{% block content %}

<div class="flex items-center mb-4">
    <a href="{{ url_for('barriles.lista') }}" class="text-gray-500 hover:text-gray-700 mr-2">&larr;</a>
    <h1 class="text-2xl font-bold text-gray-800">Nuevo Barril</h1>
</div>

<form method="POST" class="bg-white rounded-xl shadow p-6 space-y-4 max-w-2xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Nombre / ID *</label>
            <input type="text" name="nombre" required placeholder="Ej: Keg #1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-beer-300 focus:border-beer-400 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Capacidad (L)</label>
            <input type="number" name="capacidad_l" value="20" step="0.1" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-beer-300 focus:border-beer-400 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Contenido actual</label>
            <input type="text" name="contenido_actual" placeholder="Ej: Golden Ale" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-beer-300 focus:border-beer-400 outline-none">
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Ubicacion</label>
            <input type="text" name="ubicacion" placeholder="Ej: Camara fria" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-beer-300 focus:border-beer-400 outline-none">
        </div>
    </div>
    <div class="flex gap-3 pt-2">
        <button type="submit" class="bg-beer-500 hover:bg-beer-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">Guardar</button>
        <a href="{{ url_for('barriles.lista') }}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-medium transition">Cancelar</a>
    </div>
</form>

{% endblock %}
