{% extends "base.html" %}
{% block title %}Nuevo Barril - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div><a href="{{ url_for('barriles.lista') }}" class="back-link">&larr; Barriles</a><h1 style="margin-top:0.25rem">Nuevo Barril</h1></div>
</div>

<form method="POST" class="card" style="max-width:500px"><div class="card-body">
    <div class="form-grid">
        <div class="form-group"><label class="form-label">Nombre / ID *</label><input type="text" name="nombre" required placeholder="Ej: Keg #1" class="form-input"></div>
        <div class="form-group"><label class="form-label">Capacidad (L)</label><input type="number" name="capacidad_l" value="20" step="0.1" class="form-input"></div>
        <div class="form-group"><label class="form-label">Contenido actual</label><input type="text" name="contenido_actual" placeholder="Ej: Golden Ale" class="form-input"></div>
        <div class="form-group"><label class="form-label">Ubicacion</label><input type="text" name="ubicacion" placeholder="Ej: Camara fria" class="form-input"></div>
    </div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('barriles.lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</div></form>
{% endblock %}
