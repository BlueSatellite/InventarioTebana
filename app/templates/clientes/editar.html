{% extends "base.html" %}
{% block title %}Editar Cliente - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div><a href="{{ url_for('clientes.lista') }}" class="back-link">&larr; Clientes</a><h1 style="margin-top:0.25rem">Editar: {{ cliente.nombre }}</h1></div>
</div>

<form method="POST" class="card" style="max-width:560px"><div class="card-body">
    <div class="form-grid">
        <div class="form-group"><label class="form-label">Nombre *</label><input type="text" name="nombre" required value="{{ cliente.nombre }}" class="form-input"></div>
        <div class="form-group"><label class="form-label">Contacto</label><input type="text" name="contacto" value="{{ cliente.contacto or '' }}" class="form-input"></div>
        <div class="form-group"><label class="form-label">Tipo</label><select name="tipo" class="form-select"><option value="">-</option>{% for t in ['bar','restaurante','retail','particular','otro'] %}<option value="{{ t }}" {{ 'selected' if cliente.tipo==t }}>{{ t|capitalize }}</option>{% endfor %}</select></div>
        <div class="form-group"><label class="form-label">Direccion</label><input type="text" name="direccion" value="{{ cliente.direccion or '' }}" class="form-input"></div>
    </div>
    <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="2" class="form-textarea">{{ cliente.notas or '' }}</textarea></div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('clientes.lista') }}" class="btn btn-secondary">Cancelar</a>
        <form method="POST" action="{{ url_for('clientes.eliminar', id=cliente.id) }}" onsubmit="return confirm('Eliminar?');"><button type="submit" class="btn btn-danger">Eliminar</button></form>
    </div>
</div></form>
{% endblock %}
