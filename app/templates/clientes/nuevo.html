{% extends "base.html" %}
{% block title %}Nuevo Cliente - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div><a href="{{ url_for('clientes.lista') }}" class="back-link">&larr; Clientes</a><h1 style="margin-top:0.25rem">Nuevo Cliente</h1></div>
</div>

<form method="POST" class="card" style="max-width:560px"><div class="card-body">
    <div class="form-grid">
        <div class="form-group"><label class="form-label">Nombre *</label><input type="text" name="nombre" required class="form-input"></div>
        <div class="form-group"><label class="form-label">Contacto</label><input type="text" name="contacto" placeholder="Telefono, email..." class="form-input"></div>
        <div class="form-group"><label class="form-label">Tipo</label><select name="tipo" class="form-select"><option value="">-</option><option value="bar">Bar</option><option value="restaurante">Restaurante</option><option value="retail">Retail</option><option value="particular">Particular</option><option value="otro">Otro</option></select></div>
        <div class="form-group"><label class="form-label">Direccion</label><input type="text" name="direccion" class="form-input"></div>
    </div>
    <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="2" class="form-textarea"></textarea></div>
    <div style="display:flex;gap:0.75rem;margin-top:1rem">
        <button type="submit" class="btn btn-primary">Guardar</button>
        <a href="{{ url_for('clientes.lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</div></form>
{% endblock %}
