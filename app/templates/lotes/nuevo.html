{% extends "base.html" %}
{% block title %}Nuevo Lote - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div><a href="{{ url_for('lotes.lista') }}" class="back-link">&larr; Lotes</a><h1 style="margin-top:0.25rem">Nuevo Lote</h1></div>
</div>

<form method="POST" class="card" style="max-width:640px">
    <div class="card-body">
        <div class="form-group"><label class="form-label">Nombre del lote *</label><input type="text" name="nombre" required placeholder="Ej: IPA Lote #3" class="form-input"></div>
        <div class="form-group"><label class="form-label">Receta base</label><select name="receta_id" class="form-select"><option value="">Sin receta asociada</option>{% for r in recetas %}<option value="{{ r.id }}">{{ r.nombre }} ({{ r.estilo or 'Sin estilo' }})</option>{% endfor %}</select></div>
        <div class="form-group"><label class="form-label">Volumen objetivo (L)</label><input type="number" name="volumen_objetivo_l" value="20" step="0.1" class="form-input"></div>
        <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="3" class="form-textarea"></textarea></div>
        <p style="color:var(--color-muted);font-size:0.75rem">Al crear el lote se descuenta automaticamente el stock de los ingredientes de la receta.</p>
        <div style="display:flex;gap:0.75rem;margin-top:1rem">
            <button type="submit" class="btn btn-primary">Crear Lote</button>
            <a href="{{ url_for('lotes.lista') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </div>
</form>
{% endblock %}
