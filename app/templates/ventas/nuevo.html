{% extends "base.html" %}
{% block title %}Nuevo Pedido - Cerveceria{% endblock %}
{% block content %}

<div class="flex items-center mb-4">
    <a href="{{ url_for('ventas.lista') }}" class="text-gray-500 hover:text-gray-700 mr-2">&larr;</a>
    <h1 class="text-2xl font-bold text-gray-800">Nuevo Pedido</h1>
</div>

<form method="POST" class="space-y-4 max-w-2xl">
    <div class="bg-white rounded-xl shadow p-6">
        <div>
            <label class="block text-sm font-medium text-gray-600 mb-1">Cliente *</label>
            <select name="cliente_id" required class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-beer-300 focus:border-beer-400 outline-none bg-white">
                <option value="">Seleccionar cliente...</option>
                {% for c in clientes %}
                <option value="{{ c.id }}">{{ c.nombre }}</option>
                {% endfor %}
            </select>
            {% if not clientes %}
            <p class="text-xs text-red-500 mt-1">Primero debes crear un cliente en Inventario.</p>
            {% endif %}
        </div>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <h2 class="font-bold text-gray-700 mb-3">Productos</h2>
        <div id="lineas-container" class="space-y-3">
            <div class="linea-row grid grid-cols-12 gap-2 items-end border-b border-gray-100 pb-3">
                <div class="col-span-5">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Producto</label>
                    <input type="text" name="producto[]" placeholder="Ej: Golden Ale" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-beer-300 outline-none">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Cant.</label>
                    <input type="number" name="cantidad[]" value="1" step="0.1" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-beer-300 outline-none">
                </div>
                <div class="col-span-3">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Precio ($)</label>
                    <input type="number" name="precio_unitario[]" step="0.01" class="w-full border border-gray-300 rounded-lg px-2 py-2 text-sm focus:ring-2 focus:ring-beer-300 outline-none">
                </div>
                <div class="col-span-2">
                    <button type="button" class="eliminar-linea text-red-400 hover:text-red-600 text-lg">&times;</button>
                </div>
                <input type="hidden" name="lote_id[]" value="">
            </div>
        </div>
        <button type="button" id="agregar-linea" class="mt-3 text-sm text-beer-600 hover:text-beer-700 font-medium">
            + Agregar producto
        </button>
    </div>

    <div class="bg-white rounded-xl shadow p-6">
        <label class="block text-sm font-medium text-gray-600 mb-1">Notas</label>
        <textarea name="notas" rows="2" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-beer-300 focus:border-beer-400 outline-none"></textarea>
    </div>

    <div class="flex gap-3">
        <button type="submit" class="bg-beer-500 hover:bg-beer-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium transition">Crear Pedido</button>
        <a href="{{ url_for('ventas.lista') }}" class="bg-gray-200 hover:bg-gray-300 text-gray-700 px-6 py-2.5 rounded-lg text-sm font-medium transition">Cancelar</a>
    </div>
</form>

<script>
document.getElementById('agregar-linea').addEventListener('click', function() {
    const container = document.getElementById('lineas-container');
    const template = container.querySelector('.linea-row').cloneNode(true);
    template.querySelectorAll('input').forEach(function(inp) { inp.value = ''; });
    template.querySelector('input[name="cantidad[]"]').value = '1';
    template.querySelector('.eliminar-linea').addEventListener('click', function() {
        if (document.querySelectorAll('.linea-row').length > 1) template.remove();
    });
    container.appendChild(template);
});

document.querySelectorAll('.eliminar-linea').forEach(function(btn) {
    btn.addEventListener('click', function() {
        if (document.querySelectorAll('.linea-row').length > 1) btn.closest('.linea-row').remove();
    });
});
</script>

{% endblock %}
