{% extends "base.html" %}
{% block title %}Nuevo Pedido - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div><a href="{{ url_for('ventas.lista') }}" class="back-link">&larr; Pedidos</a><h1 style="margin-top:0.25rem">Nuevo Pedido</h1></div>
</div>

<form method="POST">
    <div class="card" style="margin-bottom:1rem;max-width:640px"><div class="card-body">
        <div class="form-group"><label class="form-label">Cliente *</label>
            <select name="cliente_id" required class="form-select">
                <option value="">Seleccionar...</option>{% for c in clientes %}<option value="{{ c.id }}">{{ c.nombre }}</option>{% endfor %}
            </select>
            {% if not clientes %}<p class="text-sm text-muted" style="margin-top:0.25rem">Primero crea un cliente.</p>{% endif %}
        </div>
    </div></div>

    <div class="card" style="margin-bottom:1rem"><div class="card-header"><h2>Productos</h2></div><div class="card-body">
        <div id="lineas-container" style="display:flex;flex-direction:column;gap:0.5rem">
            <div class="linea-row" style="display:flex;gap:0.5rem;align-items:flex-end;flex-wrap:wrap;padding-bottom:0.75rem;border-bottom:1px solid var(--color-border)">
                <div style="min-width:120px;flex:2" class="form-group" style="margin-bottom:0"><label class="form-label">Producto</label><input type="text" name="producto[]" placeholder="Ej: Golden Ale" class="form-input"></div>
                <div style="min-width:60px;flex:0.7" class="form-group" style="margin-bottom:0"><label class="form-label">Cant.</label><input type="number" name="cantidad[]" value="1" step="0.1" class="form-input"></div>
                <div style="min-width:80px;flex:1" class="form-group" style="margin-bottom:0"><label class="form-label">Precio ($)</label><input type="number" name="precio_unitario[]" step="0.01" class="form-input"></div>
                <button type="button" class="eliminar-linea btn btn-ghost btn-sm" style="color:var(--color-danger);margin-bottom:0.25rem">&times;</button>
                <input type="hidden" name="lote_id[]" value="">
            </div>
        </div>
        <button type="button" id="agregar-linea" class="btn btn-ghost btn-sm" style="margin-top:0.75rem">+ Agregar producto</button>
    </div></div>

    <div class="card" style="margin-bottom:1rem;max-width:640px"><div class="card-body">
        <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="2" class="form-textarea"></textarea></div>
    </div></div>

    <div style="display:flex;gap:0.75rem">
        <button type="submit" class="btn btn-primary">Crear Pedido</button>
        <a href="{{ url_for('ventas.lista') }}" class="btn btn-secondary">Cancelar</a>
    </div>
</form>

<script>
document.getElementById('agregar-linea').addEventListener('click',function(){var c=document.getElementById('lineas-container');var t=c.querySelector('.linea-row').cloneNode(true);t.querySelectorAll('input[type="text"],input[type="number"]').forEach(function(i){i.value=''});t.querySelector('input[name="cantidad[]"]').value='1';t.querySelector('.eliminar-linea').addEventListener('click',function(){if(document.querySelectorAll('.linea-row').length>1)t.remove()});c.appendChild(t)});
document.querySelectorAll('.eliminar-linea').forEach(function(b){b.addEventListener('click',function(){if(document.querySelectorAll('.linea-row').length>1)b.closest('.linea-row').remove()})});
</script>
{% endblock %}
