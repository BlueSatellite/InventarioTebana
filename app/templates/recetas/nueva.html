{% extends "base.html" %}
{% block title %}Nueva Receta - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <a href="{{ url_for('recetas.lista') }}" class="back-link">&larr; Recetas</a>
        <h1 style="margin-top:0.25rem">Nueva Receta</h1>
    </div>
</div>

<form method="POST" class="card" style="margin-bottom:1rem">
    <div class="card-header"><h2>Datos generales</h2></div>
    <div class="card-body">
        <div class="form-grid">
            <div class="form-group"><label class="form-label">Nombre *</label><input type="text" name="nombre" required class="form-input"></div>
            <div class="form-group"><label class="form-label">Estilo</label><input type="text" name="estilo" placeholder="Ej: American IPA" class="form-input"></div>
            <div class="form-group"><label class="form-label">Vol. objetivo (L)</label><input type="number" name="volumen_objetivo_l" value="20" step="0.1" class="form-input" id="volumen"></div>
            <div class="form-group"><label class="form-label">Eficiencia (%)</label><input type="number" name="eficiencia" value="70" step="1" class="form-input"></div>
            <div class="form-group"><label class="form-label">OG objetivo</label><input type="number" name="og_objetivo" value="1.050" step="0.001" class="form-input" id="og"></div>
            <div class="form-group"><label class="form-label">FG objetivo</label><input type="number" name="fg_objetivo" value="1.012" step="0.001" class="form-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="2" class="form-textarea"></textarea></div>
    </div>
</div>

<div class="card" style="margin-bottom:1rem">
    <div class="card-header"><h2>Ingredientes</h2></div>
    <div class="card-body">
        <div id="insumos-container" style="display:flex;flex-direction:column;gap:0.5rem">
            <div class="insumo-row" data-index="0" style="display:flex;gap:0.5rem;align-items:flex-end;flex-wrap:wrap;padding-bottom:0.75rem;border-bottom:1px solid var(--color-border)">
                <div style="min-width:100px;flex:1" class="form-group" style="margin-bottom:0"><label class="form-label">Tipo</label>
                    <select name="insumo_tipo[]" class="form-select insumo-tipo"><option value="malta">Malta</option><option value="lupulo">Lupulo</option><option value="levadura">Levadura</option><option value="adjunto">Adjunto</option></select>
                </div>
                <div style="min-width:150px;flex:2" class="form-group" style="margin-bottom:0"><label class="form-label">Ingrediente</label>
                    <select name="insumo_ingrediente_id[]" class="form-select"><option value="">Seleccionar...</option>
                        {% for ing in ingredientes %}<option value="{{ ing.id }}" data-tipo="{{ ing.tipo }}" data-alpha="{{ ing.alpha_acido }}" data-lovibond="{{ ing.lovibond }}">{{ ing.nombre }}</option>{% endfor %}
                    </select>
                </div>
                <div style="min-width:70px;flex:0.7" class="form-group" style="margin-bottom:0"><label class="form-label">Cant.</label><input type="number" name="insumo_cantidad[]" step="0.01" class="form-input"></div>
                <div style="min-width:65px;flex:0.5" class="form-group" style="margin-bottom:0"><label class="form-label">Unidad</label>
                    <select name="insumo_unidad[]" class="form-select"><option value="kg">kg</option><option value="g">g</option><option value="lb">lb</option><option value="oz">oz</option><option value="L">L</option></select>
                </div>
                <div style="min-width:80px;flex:0.7;display:none" class="lupulo-campos form-group" style="margin-bottom:0"><label class="form-label">Tiempo</label><input type="number" name="insumo_tiempo[]" value="60" class="form-input"></div>
                <div style="min-width:90px;flex:0.7;display:none" class="lupulo-campos form-group" style="margin-bottom:0"><label class="form-label">Uso</label>
                    <select name="insumo_uso[]" class="form-select"><option value="amargor">Amargor</option><option value="sabor">Sabor</option><option value="aroma">Aroma</option><option value="dry-hop">Dry Hop</option></select>
                </div>
                <button type="button" class="eliminar-fila btn btn-ghost btn-sm" style="color:var(--color-danger);margin-bottom:0.25rem" title="Eliminar">&times;</button>
            </div>
        </div>
        <button type="button" id="agregar-insumo" class="btn btn-ghost btn-sm" style="margin-top:0.75rem">+ Agregar ingrediente</button>
    </div>
</div>

<div class="card" style="margin-bottom:1rem" id="resumen-calculos">
    <div class="card-header"><h2>Calculos estimados</h2></div>
    <div class="card-body">
        <div class="stat-grid">
            <div class="stat-card"><span class="stat-label">ABV</span><span class="stat-value" style="font-size:1.25rem" id="calc-abv">-</span></div>
            <div class="stat-card"><span class="stat-label">IBU</span><span class="stat-value" style="font-size:1.25rem" id="calc-ibu">-</span></div>
            <div class="stat-card"><span class="stat-label">Color SRM</span><span class="stat-value" style="font-size:1.25rem" id="calc-color">-</span></div>
            <div class="stat-card"><span class="stat-label">Atenuacion</span><span class="stat-value" style="font-size:1.25rem" id="calc-atten">-</span></div>
        </div>
    </div>
</div>

<div style="display:flex;gap:0.75rem">
    <button type="submit" class="btn btn-primary">Guardar Receta</button>
    <a href="{{ url_for('recetas.lista') }}" class="btn btn-secondary">Cancelar</a>
</div>
</form>

<script>
let insumoCount = 1;
document.getElementById('agregar-insumo').addEventListener('click', function() {
    const container = document.getElementById('insumos-container');
    const template = container.querySelector('.insumo-row').cloneNode(true);
    template.setAttribute('data-index', insumoCount);
    template.querySelectorAll('input').forEach(function(inp) { inp.value = ''; });
    template.querySelectorAll('select').forEach(function(sel) { sel.selectedIndex = 0; });
    const timeInput = template.querySelector('input[name="insumo_tiempo[]"]');
    if (timeInput) timeInput.value = '60';
    container.appendChild(template);
    insumoCount++;
    bindRowEvents(template);
});
document.querySelectorAll('.insumo-row').forEach(bindRowEvents);
function bindRowEvents(row) {
    row.querySelector('.eliminar-fila')?.addEventListener('click', function() {
        if (document.querySelectorAll('.insumo-row').length > 1) { row.remove(); actualizarCalculos(); }
    });
    row.querySelector('.insumo-tipo')?.addEventListener('change', function() { actualizarVisibilidad(row); actualizarCalculos(); });
    row.querySelectorAll('input, select').forEach(function(el) { el.addEventListener('change', actualizarCalculos); el.addEventListener('input', actualizarCalculos); });
    actualizarVisibilidad(row);
}
function actualizarVisibilidad(row) {
    const tipo = row.querySelector('.insumo-tipo')?.value;
    row.querySelectorAll('.lupulo-campos').forEach(function(el) { el.style.display = tipo === 'lupulo' ? '' : 'none'; });
}
function actualizarCalculos() {
    const og = parseFloat(document.getElementById('og').value) || 1.050;
    const fg = parseFloat(document.querySelector('input[name="fg_objetivo"]').value) || 1.012;
    const vL = parseFloat(document.getElementById('volumen').value) || 20;
    const vGal = vL * 0.264172;
    let ibu = 0, srm = 0;
    document.querySelectorAll('.insumo-row').forEach(function(row) {
        const tipo = row.querySelector('.insumo-tipo').value;
        const cant = parseFloat(row.querySelector('input[name="insumo_cantidad[]"]').value) || 0;
        const unidad = row.querySelector('select[name="insumo_unidad[]"]').value;
        const tiempo = parseInt(row.querySelector('input[name="insumo_tiempo[]"]')?.value) || 0;
        const sel = row.querySelector('select[name="insumo_ingrediente_id[]"]');
        if (!sel || !sel.selectedOptions[0]) return;
        const opt = sel.selectedOptions[0];
        const alpha = parseFloat(opt.getAttribute('data-alpha')) || 0;
        const lov = parseFloat(opt.getAttribute('data-lovibond')) || 0;
        if (tipo === 'lupulo' && alpha > 0 && tiempo > 0 && cant > 0) {
            const g = unidad === 'g' ? cant : (unidad === 'kg' ? cant*1000 : (unidad === 'oz' ? cant*28.3495 : cant));
            ibu += (alpha * (1.65*Math.pow(0.000125,(og-1))) * ((1-Math.exp(-0.04*tiempo))/4.15) * g * 1000) / (vL * 10) * 0.9;
        }
        if (tipo === 'malta' && lov > 0 && cant > 0) {
            const lbs = unidad === 'lb' ? cant : (unidad === 'kg' ? cant*2.20462 : (unidad === 'g' ? cant*0.00220462 : cant));
            srm += 1.4922 * Math.pow((lov*lbs)/(vGal||1), 0.6859);
        }
    });
    document.getElementById('calc-abv').textContent = ((og-fg)*131.25).toFixed(1) + '%';
    document.getElementById('calc-ibu').textContent = Math.round(ibu) + ' IBU';
    document.getElementById('calc-color').textContent = Math.round(srm) + ' SRM';
    document.getElementById('calc-atten').textContent = Math.round(og>1?((og-fg)/(og-1))*100:0) + '%';
}
actualizarCalculos();
</script>
{% endblock %}
