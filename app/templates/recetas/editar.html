{% extends "base.html" %}
{% block title %}Editar Receta - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div>
        <a href="{{ url_for('recetas.ver', id=receta.id) }}" class="back-link">&larr; {{ receta.nombre }}</a>
        <h1 style="margin-top:0.25rem">Editar Receta</h1>
    </div>
</div>

<form method="POST" class="card" style="margin-bottom:1rem">
    <div class="card-header"><h2>Datos generales</h2></div>
    <div class="card-body">
        <div class="form-grid">
            <div class="form-group"><label class="form-label">Nombre *</label><input type="text" name="nombre" required value="{{ receta.nombre }}" class="form-input"></div>
            <div class="form-group"><label class="form-label">Estilo</label><input type="text" name="estilo" value="{{ receta.estilo or '' }}" class="form-input"></div>
            <div class="form-group"><label class="form-label">Vol. objetivo (L)</label><input type="number" name="volumen_objetivo_l" value="{{ receta.volumen_objetivo_l }}" step="0.1" class="form-input"></div>
            <div class="form-group"><label class="form-label">Eficiencia (%)</label><input type="number" name="eficiencia" value="{{ receta.eficiencia }}" step="1" class="form-input"></div>
            <div class="form-group"><label class="form-label">OG objetivo</label><input type="number" name="og_objetivo" value="{{ "%.3f"|format(receta.og_objetivo) if receta.og_objetivo else '1.050' }}" step="0.001" class="form-input"></div>
            <div class="form-group"><label class="form-label">FG objetivo</label><input type="number" name="fg_objetivo" value="{{ "%.3f"|format(receta.fg_objetivo) if receta.fg_objetivo else '1.012' }}" step="0.001" class="form-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="2" class="form-textarea">{{ receta.notas or '' }}</textarea></div>
    </div>
</div>

<div class="card" style="margin-bottom:1rem">
    <div class="card-header"><h2>Ingredientes</h2></div>
    <div class="card-body">
        <div id="insumos-container" style="display:flex;flex-direction:column;gap:0.5rem">
            {% for insumo in receta.insumos %}
            <div class="insumo-row" data-index="{{ loop.index0 }}" style="display:flex;gap:0.5rem;align-items:flex-end;flex-wrap:wrap;padding-bottom:0.75rem;border-bottom:1px solid var(--color-border)">
                <div style="min-width:100px;flex:1" class="form-group" style="margin-bottom:0"><label class="form-label">Tipo</label>
                    <select name="insumo_tipo[]" class="form-select insumo-tipo">
                        <option value="malta" {{ 'selected' if insumo.ingrediente.tipo == 'malta' }}>Malta</option>
                        <option value="lupulo" {{ 'selected' if insumo.ingrediente.tipo == 'lupulo' }}>Lupulo</option>
                        <option value="levadura" {{ 'selected' if insumo.ingrediente.tipo == 'levadura' }}>Levadura</option>
                        <option value="adjunto" {{ 'selected' if insumo.ingrediente.tipo == 'adjunto' }}>Adjunto</option>
                    </select>
                </div>
                <div style="min-width:150px;flex:2" class="form-group" style="margin-bottom:0"><label class="form-label">Ingrediente</label>
                    <select name="insumo_ingrediente_id[]" class="form-select">
                        {% for ing in ingredientes %}<option value="{{ ing.id }}" data-tipo="{{ ing.tipo }}" data-alpha="{{ ing.alpha_acido }}" data-lovibond="{{ ing.lovibond }}" {{ 'selected' if ing.id == insumo.ingrediente_id }}>{{ ing.nombre }}</option>{% endfor %}
                    </select>
                </div>
                <div style="min-width:70px;flex:0.7" class="form-group" style="margin-bottom:0"><label class="form-label">Cant.</label><input type="number" name="insumo_cantidad[]" step="0.01" value="{{ insumo.cantidad }}" class="form-input"></div>
                <div style="min-width:65px;flex:0.5" class="form-group" style="margin-bottom:0"><label class="form-label">Unidad</label>
                    <select name="insumo_unidad[]" class="form-select"><option value="kg" {{ 'selected' if insumo.unidad == 'kg' }}>kg</option><option value="g" {{ 'selected' if insumo.unidad == 'g' }}>g</option><option value="lb" {{ 'selected' if insumo.unidad == 'lb' }}>lb</option><option value="oz" {{ 'selected' if insumo.unidad == 'oz' }}>oz</option><option value="L" {{ 'selected' if insumo.unidad == 'L' }}>L</option></select>
                </div>
                <div style="min-width:80px;flex:0.7" class="lupulo-campos form-group" style="margin-bottom:0;display:{{ '' if insumo.ingrediente.tipo == 'lupulo' else 'none' }}"><label class="form-label">Tiempo</label><input type="number" name="insumo_tiempo[]" value="{{ insumo.tiempo }}" class="form-input"></div>
                <div style="min-width:90px;flex:0.7" class="lupulo-campos form-group" style="margin-bottom:0;display:{{ '' if insumo.ingrediente.tipo == 'lupulo' else 'none' }}"><label class="form-label">Uso</label>
                    <select name="insumo_uso[]" class="form-select"><option value="amargor" {{ 'selected' if insumo.uso == 'amargor' }}>Amargor</option><option value="sabor" {{ 'selected' if insumo.uso == 'sabor' }}>Sabor</option><option value="aroma" {{ 'selected' if insumo.uso == 'aroma' }}>Aroma</option><option value="dry-hop" {{ 'selected' if insumo.uso == 'dry-hop' }}>Dry Hop</option></select>
                </div>
                <button type="button" class="eliminar-fila btn btn-ghost btn-sm" style="color:var(--color-danger);margin-bottom:0.25rem">&times;</button>
            </div>
            {% endfor %}
        </div>
        <button type="button" id="agregar-insumo" class="btn btn-ghost btn-sm" style="margin-top:0.75rem">+ Agregar</button>
    </div>
</div>

<div style="display:flex;gap:0.75rem">
    <button type="submit" class="btn btn-primary">Guardar cambios</button>
    <a href="{{ url_for('recetas.ver', id=receta.id) }}" class="btn btn-secondary">Cancelar</a>
</div>
</form>

<script>
let insumoCount = {{ receta.insumos|length }};
document.getElementById('agregar-insumo').addEventListener('click', function() {
    const container = document.getElementById('insumos-container');
    const template = container.querySelector('.insumo-row').cloneNode(true);
    template.setAttribute('data-index', insumoCount);
    template.querySelectorAll('input').forEach(function(inp) { inp.value = ''; });
    template.querySelectorAll('select').forEach(function(sel) { sel.selectedIndex = 0; });
    const ti = template.querySelector('input[name="insumo_tiempo[]"]'); if(ti) ti.value = '60';
    container.appendChild(template); insumoCount++; bindRowEvents(template);
});
document.querySelectorAll('.insumo-row').forEach(bindRowEvents);
function bindRowEvents(row) {
    row.querySelector('.eliminar-fila')?.addEventListener('click', function() { if(document.querySelectorAll('.insumo-row').length>1) row.remove(); });
    row.querySelector('.insumo-tipo')?.addEventListener('change', function() {
        row.querySelectorAll('.lupulo-campos').forEach(function(el) { el.style.display = this.value==='lupulo'?'':'none'; });
    });
}
</script>
{% endblock %}
