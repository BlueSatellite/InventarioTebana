{% extends "base.html" %}
{% block title %}Editar Ingrediente - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div><a href="{{ url_for('inventario.lista') }}" class="back-link">&larr; Inventario</a><h1 style="margin-top:0.25rem">Editar: {{ ingrediente.nombre }}</h1></div>
</div>

<form method="POST" class="card" style="max-width:640px">
    <div class="card-body">
        <div class="form-grid">
            <div class="form-group"><label class="form-label">Nombre *</label><input type="text" name="nombre" required value="{{ ingrediente.nombre }}" class="form-input"></div>
            <div class="form-group"><label class="form-label">Tipo *</label><select name="tipo" required class="form-select" id="tipo-select">{% for t in tipos %}<option value="{{ t }}" {{ 'selected' if ingrediente.tipo == t }}>{{ t|capitalize }}</option>{% endfor %}</select></div>
            <div class="form-group"><label class="form-label">Cantidad</label><input type="number" name="cantidad" value="{{ ingrediente.cantidad }}" step="0.01" class="form-input"></div>
            <div class="form-group"><label class="form-label">Unidad</label><select name="unidad" class="form-select"><option value="kg" {{ 'selected' if ingrediente.unidad == 'kg' }}>kg</option><option value="g" {{ 'selected' if ingrediente.unidad == 'g' }}>g</option><option value="lb" {{ 'selected' if ingrediente.unidad == 'lb' }}>lb</option><option value="oz" {{ 'selected' if ingrediente.unidad == 'oz' }}>oz</option><option value="L" {{ 'selected' if ingrediente.unidad == 'L' }}>L</option><option value="unidad" {{ 'selected' if ingrediente.unidad == 'unidad' }}>unidad</option></select></div>
            <div class="form-group"><label class="form-label">Stock minimo</label><input type="number" name="stock_minimo" value="{{ ingrediente.stock_minimo }}" step="0.01" class="form-input"></div>
            <div class="form-group"><label class="form-label">Precio ($)</label><input type="number" name="precio" value="{{ ingrediente.precio }}" step="0.01" class="form-input"></div>
            <div class="form-group"><label class="form-label">Lote / Proveedor</label><input type="text" name="lote_interno" value="{{ ingrediente.lote_interno or '' }}" class="form-input"></div>
            <div class="form-group"><label class="form-label">Caducidad</label><input type="date" name="fecha_caducidad" value="{{ ingrediente.fecha_caducidad.strftime('%Y-%m-%d') if ingrediente.fecha_caducidad else '' }}" class="form-input"></div>
        </div>
        <div class="form-grid" style="margin-top:0.75rem">
            <div class="form-group" id="campo-alpha" style="display:{{ '' if ingrediente.tipo == 'lupulo' else 'none' }}"><label class="form-label">% Alfa acido</label><input type="number" name="alpha_acido" value="{{ ingrediente.alpha_acido }}" step="0.1" class="form-input"></div>
            <div class="form-group" id="campo-lovibond" style="display:{{ '' if ingrediente.tipo == 'malta' else 'none' }}"><label class="form-label">Lovibond</label><input type="number" name="lovibond" value="{{ ingrediente.lovibond }}" step="0.1" class="form-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="2" class="form-textarea">{{ ingrediente.notas or '' }}</textarea></div>
        <div style="display:flex;gap:0.75rem;margin-top:1rem">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('inventario.lista') }}" class="btn btn-secondary">Cancelar</a>
            <form method="POST" action="{{ url_for('inventario.eliminar', id=ingrediente.id) }}" onsubmit="return confirm('Eliminar?');"><button type="submit" class="btn btn-danger">Eliminar</button></form>
        </div>
    </div>
</form>

<script>document.getElementById('tipo-select').addEventListener('change',function(){var t=this.value;document.getElementById('campo-alpha').style.display=t==='lupulo'?'':'none';document.getElementById('campo-lovibond').style.display=t==='malta'?'':'none';});</script>
{% endblock %}
