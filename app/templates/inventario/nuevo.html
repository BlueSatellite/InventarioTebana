{% extends "base.html" %}
{% block title %}Nuevo Ingrediente - Tebana{% endblock %}
{% block content %}

<div class="page-header">
    <div><a href="{{ url_for('inventario.lista') }}" class="back-link">&larr; Inventario</a><h1 style="margin-top:0.25rem">Nuevo Ingrediente</h1></div>
</div>

<form method="POST" class="card" style="max-width:640px">
    <div class="card-body">
        <div class="form-grid">
            <div class="form-group"><label class="form-label">Nombre *</label><input type="text" name="nombre" required class="form-input"></div>
            <div class="form-group"><label class="form-label">Tipo *</label><select name="tipo" required class="form-select" id="tipo-select">{% for t in tipos %}<option value="{{ t }}">{{ t|capitalize }}</option>{% endfor %}</select></div>
            <div class="form-group"><label class="form-label">Cantidad inicial</label><input type="number" name="cantidad" value="0" step="0.01" class="form-input"></div>
            <div class="form-group"><label class="form-label">Unidad</label><select name="unidad" class="form-select"><option value="kg">kg</option><option value="g">g</option><option value="lb">lb</option><option value="oz">oz</option><option value="L">L</option><option value="unidad">unidad</option></select></div>
            <div class="form-group"><label class="form-label">Stock minimo</label><input type="number" name="stock_minimo" value="0" step="0.01" class="form-input"></div>
            <div class="form-group"><label class="form-label">Precio ($)</label><input type="number" name="precio" value="0" step="0.01" class="form-input"></div>
            <div class="form-group"><label class="form-label">Lote / Proveedor</label><input type="text" name="lote_interno" class="form-input"></div>
            <div class="form-group"><label class="form-label">Caducidad</label><input type="date" name="fecha_caducidad" class="form-input"></div>
        </div>
        <div class="form-grid" style="margin-top:0.75rem">
            <div class="form-group" id="campo-alpha" style="display:none"><label class="form-label">% Alfa acido</label><input type="number" name="alpha_acido" value="0" step="0.1" class="form-input"></div>
            <div class="form-group" id="campo-lovibond" style="display:none"><label class="form-label">Lovibond (color)</label><input type="number" name="lovibond" value="0" step="0.1" class="form-input"></div>
        </div>
        <div class="form-group"><label class="form-label">Notas</label><textarea name="notas" rows="2" class="form-textarea"></textarea></div>
        <div style="display:flex;gap:0.75rem;margin-top:1rem">
            <button type="submit" class="btn btn-primary">Guardar</button>
            <a href="{{ url_for('inventario.lista') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </div>
</form>

<script>document.getElementById('tipo-select').addEventListener('change',function(){var t=this.value;document.getElementById('campo-alpha').style.display=t==='lupulo'?'':'none';document.getElementById('campo-lovibond').style.display=t==='malta'?'':'none';});</script>
{% endblock %}
